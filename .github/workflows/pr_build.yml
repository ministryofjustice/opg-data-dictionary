name: Test Build
on:
  push:
    branches-ignore:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: true

      - name: Update submodules
        run: git submodule update --remote

      - name: Install and Build
        run: |
          npm ci --ignore-scripts
          npm run build
